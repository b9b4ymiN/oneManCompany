<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="30" y1="20" x2="1220" y2="824" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F5"/>
      <stop offset="1" stop-color="#F6E7DA"/>
    </linearGradient>
    <linearGradient id="ink" x1="84" y1="120" x2="1180" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D97745"/>
      <stop offset="1" stop-color="#8B5A3C"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#5B341F" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #2B1C14; }
      .subtitle { font: 600 17px Inter, Segoe UI, Arial, sans-serif; fill: #7C4A2D; }
      .boxTitle { font: 700 17px Inter, Segoe UI, Arial, sans-serif; fill: #2B1C14; }
      .boxText { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #6B4A38; }
      .chip { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #2B1C14; }
    </style>
  </defs>
  <rect width="1280" height="860" rx="28" fill="url(#bg)"/>
  <text x="70" y="70" class="title">onemancompany architecture and execution flow</text>
  <text x="70" y="100" class="subtitle">A stable company kernel orchestrates people-like agent roles, evidence, protocol messages, and durable decision memory.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="140" width="180" height="100" rx="18" fill="#FFFFFF"/>
    <rect x="280" y="140" width="180" height="100" rx="18" fill="#FFFFFF"/>
    <rect x="490" y="140" width="180" height="100" rx="18" fill="#FFFFFF"/>
    <rect x="700" y="140" width="180" height="100" rx="18" fill="#FFFFFF"/>
    <rect x="910" y="140" width="180" height="100" rx="18" fill="#FFFFFF"/>
    <rect x="1120" y="140" width="110" height="100" rx="18" fill="#FFFFFF"/>
  </g>

  <g>
    <text x="96" y="176" class="boxTitle">Interface</text>
    <text x="96" y="200" class="boxText">owner brief</text>
    <text x="96" y="220" class="boxText">review checkpoints</text>

    <text x="306" y="176" class="boxTitle">Kernel</text>
    <text x="306" y="200" class="boxText">planner · state machine</text>
    <text x="306" y="220" class="boxText">constitution · synthesis</text>

    <text x="516" y="176" class="boxTitle">Registry</text>
    <text x="516" y="200" class="boxText">agents · models</text>
    <text x="516" y="220" class="boxText">sources · domains</text>

    <text x="726" y="176" class="boxTitle">Observability</text>
    <text x="726" y="200" class="boxText">traces · journals</text>
    <text x="726" y="220" class="boxText">replay · scorecards</text>

    <text x="936" y="176" class="boxTitle">Adapter</text>
    <text x="936" y="200" class="boxText">Claude · Gemini</text>
    <text x="936" y="220" class="boxText">Codex · ZAI · human</text>

    <text x="1140" y="176" class="boxTitle">Protocol</text>
    <text x="1140" y="200" class="boxText">messages</text>
    <text x="1140" y="220" class="boxText">contracts</text>
  </g>

  <path d="M250 190H280" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M460 190H490" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M670 190H700" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M880 190H910" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M1090 190H1120" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>

  <text x="70" y="304" class="boxTitle">Mission lifecycle</text>
  <text x="70" y="330" class="boxText">The kernel moves every mission through a formal sequence so evidence, debate, and decisions are auditable.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="372" width="92" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="180" y="372" width="110" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="308" y="372" width="130" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="456" y="372" width="138" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="612" y="372" width="116" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="746" y="372" width="106" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="870" y="372" width="114" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="1002" y="372" width="140" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="1160" y="372" width="90" height="56" rx="14" fill="#FFFFFF"/>
  </g>
  <g class="chip">
    <text x="97" y="406">DRAFT</text>
    <text x="205" y="406">PLANNING</text>
    <text x="333" y="406">RESEARCHING</text>
    <text x="480" y="406">HUMAN_REVIEW</text>
    <text x="640" y="406">ANALYZING</text>
    <text x="776" y="406">CROSS_QA</text>
    <text x="899" y="406">DEBATING</text>
    <text x="1030" y="406">SYNTHESIZING</text>
    <text x="1182" y="406">DECIDED</text>
  </g>
  <path d="M162 400H180" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M290 400H308" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M438 400H456" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M594 400H612" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M728 400H746" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M852 400H870" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M984 400H1002" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>
  <path d="M1142 400H1160" stroke="url(#ink)" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="70" y="500" width="360" height="246" rx="22" fill="#FFFFFF"/>
    <rect x="460" y="500" width="360" height="246" rx="22" fill="#FFFFFF"/>
    <rect x="850" y="500" width="360" height="246" rx="22" fill="#FFFFFF"/>
  </g>

  <text x="96" y="538" class="boxTitle">1. Inputs and operating law</text>
  <text x="96" y="566" class="boxText">• owner brief enters through the interface</text>
  <text x="96" y="590" class="boxText">• domain config selects the roster and mission type</text>
  <text x="96" y="614" class="boxText">• company constitution blocks unsafe progress</text>
  <text x="96" y="638" class="boxText">• evidence standard defines how facts and claims behave</text>

  <text x="486" y="538" class="boxTitle">2. Multi-agent reasoning loop</text>
  <text x="486" y="566" class="boxText">• researchers gather primary evidence</text>
  <text x="486" y="590" class="boxText">• analysts work in parallel from different worldviews</text>
  <text x="486" y="614" class="boxText">• cross-QA and debate preserve disagreement</text>
  <text x="486" y="638" class="boxText">• CIO synthesizes one decision-ready output</text>

  <text x="876" y="538" class="boxTitle">3. Durable outputs</text>
  <text x="876" y="566" class="boxText">• journal captures the final decision state</text>
  <text x="876" y="590" class="boxText">• observability stores calls, gates, and evidence</text>
  <text x="876" y="614" class="boxText">• replay and scorecards enable system learning</text>
  <text x="876" y="638" class="boxText">• new domains reuse the same kernel contracts</text>
</svg>
